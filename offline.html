<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – PDF Store</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #0a0e1a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; margin-bottom: 24px; }
    button {
      background: #f59e0b;
      color: #000;
      border: none;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>No internet connection detected.<br/>Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
